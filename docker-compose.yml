services:

  postgres:
    image: postgres:16-alpine
    container_name: esg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-esg_intel}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-esg_intel}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - esg_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: esg-updates-app:latest
    container_name: esg_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-esg_intel}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OLLAMA_HOST:       http://host.docker.internal:11434
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - esg_network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    image: esg-updates-scheduler:latest
    container_name: esg_scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-esg_intel}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OLLAMA_HOST:       http://host.docker.internal:11434
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - esg_network

volumes:
  pg_data:

networks:
  esg_network:
    driver: bridge